<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="utf-8">
    <title>Admin Dashboard | Viralio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
    </style>
</head>
<body class="p-4 md:p-10">

    <div class="max-w-5xl mx-auto">
        <div class="flex items-center justify-between mb-8">
            <h1 class="text-2xl md:text-3xl font-black text-slate-800 flex items-center">
                <div class="w-10 h-10 bg-indigo-600 text-white rounded-xl flex items-center justify-center mr-3 shadow-lg"><i class="fa-solid fa-chart-pie"></i></div>
                Viralio Admin
            </h1>
            <button onclick="fetchData()" class="bg-white text-slate-700 px-5 py-2.5 rounded-xl font-bold hover:bg-slate-50 transition-all shadow-sm border border-slate-200">
                <i class="fa-solid fa-rotate-right mr-2"></i> Refresh
            </button>
        </div>

        <div id="loading" class="text-center py-20 text-slate-400 font-bold animate-pulse">
            Se calculează generările din baza de date...
        </div>

        <div id="dashboard-content" class="hidden space-y-8">
            
            <div>
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 pl-2">Consum General Ecosistem (Imagini + Video)</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5" id="api-grid">
                    </div>
            </div>

            <div>
                <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-3 pl-2">Breakdown Platformă</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-5" id="stats-grid">
                    </div>
            </div>

        </div>
    </div>

    <script>
        function getToken() {
            const m = document.cookie.match(/(?:^|; )viralio_token=([^;]*)/);
            return m ? m[1] : null;
        }

        async function fetchData() {
            const token = getToken();
            if (!token) {
                alert("Nu ești logat! Intră pe site-ul principal (viralio.ro), loghează-te cu contul de admin, apoi întoarce-te aici (viralio.ro/admin.html).");
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('dashboard-content').style.display = 'none';

            try {
                // Tragem ambele seturi de date simultan
                const [quotaRes, statsRes] = await Promise.all([
                    fetch('/api/admin/api-quota', { headers: { 'Authorization': 'Bearer ' + token } }),
                    fetch('/api/admin/stats', { headers: { 'Authorization': 'Bearer ' + token } })
                ]);

                if (!quotaRes.ok || !statsRes.ok) throw new Error("Nu ai acces de Admin sau a expirat sesiunea.");
                
                const quota = await quotaRes.json();
                const stats = await statsRes.json();
                
                // CALCULĂM NOI CÂTE S-AU FĂCUT PE SITE ÎN TOTAL (Poze + Video)
                const totalGenerariLocale = (stats.totalImages || 0) + (stats.totalVideos || 0);
                
                // Dacă API-ul ne dă un Total (ex: 100), îl folosim pe acela. Dacă nu, punem noi 100 manual.
                const totalAlocat = quota.veoTotal > 0 ? quota.veoTotal : 100; 
                
                // Cât a mai rămas (Alocat - Ce s-a făcut pe site)
                const totalRamas = totalAlocat - totalGenerariLocale;

                // POPULĂM GRID-UL CU CALCULUL NOSTRU
                document.getElementById('api-grid').innerHTML = `
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                        <h3 class="text-slate-400 font-bold text-[0.65rem] uppercase tracking-widest mb-1">Total Alocat</h3>
                        <div class="text-3xl font-black text-slate-800 mb-1">${totalAlocat}</div>
                        <p class="text-[0.65rem] text-slate-500 font-bold"><i class="fa-solid fa-cube text-slate-400 mr-1"></i> Limită GenAIPro</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden border-l-4 border-l-amber-400">
                        <h3 class="text-slate-400 font-bold text-[0.65rem] uppercase tracking-widest mb-1">Consumat pe site</h3>
                        <div class="text-3xl font-black text-amber-500 mb-1">${totalGenerariLocale}</div>
                        <p class="text-[0.65rem] text-slate-500 font-bold"><i class="fa-solid fa-fire text-amber-400 mr-1"></i> Imagini și video adunate</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden border-l-4 border-l-emerald-500">
                        <h3 class="text-slate-400 font-bold text-[0.65rem] uppercase tracking-widest mb-1">Generări Rămase</h3>
                        <div class="text-3xl font-black text-emerald-500 mb-1">${totalRamas}</div>
                        <p class="text-[0.65rem] text-slate-500 font-bold"><i class="fa-solid fa-check text-emerald-500 mr-1"></i> Mai poți genera</p>
                    </div>
                `;

                // POPULĂM BREAKDOWN-UL
                document.getElementById('stats-grid').innerHTML = `
                    <div class="bg-slate-900 text-white p-5 rounded-2xl border border-slate-800 shadow-xl relative overflow-hidden">
                        <i class="fa-solid fa-users absolute -right-4 -bottom-4 text-6xl text-white/5"></i>
                        <h3 class="text-slate-400 font-bold text-[0.65rem] uppercase tracking-widest mb-1">Total Utilizatori</h3>
                        <div class="text-3xl font-black mb-1">${stats.totalUsers}</div>
                        <p class="text-[0.65rem] text-slate-400 font-bold">Conturi pe platformă</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                        <div class="w-8 h-8 bg-indigo-50 text-indigo-500 rounded-lg flex items-center justify-center absolute top-5 right-5"><i class="fa-solid fa-image"></i></div>
                        <h3 class="text-slate-400 font-bold text-[0.65rem] uppercase tracking-widest mb-1">Imagini Generate</h3>
                        <div class="text-3xl font-black text-slate-800 mb-1">${stats.totalImages || 0}</div>
                        <p class="text-[0.65rem] text-slate-500 font-bold">Din totalul consumat</p>
                    </div>
                    <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm relative overflow-hidden">
                        <div class="w-8 h-8 bg-pink-50 text-pink-500 rounded-lg flex items-center justify-center absolute top-5 right-5"><i class="fa-solid fa-clapperboard"></i></div>
                        <h3 class="text-slate-400 font-bold text-[0.65rem] uppercase tracking-widest mb-1">Video Generate</h3>
                        <div class="text-3xl font-black text-slate-800 mb-1">${stats.totalVideos || 0}</div>
                        <p class="text-[0.65rem] text-slate-500 font-bold">Din totalul consumat</p>
                    </div>
                `;

                document.getElementById('loading').style.display = 'none';
                document.getElementById('dashboard-content').style.display = 'block';

            } catch (err) {
                alert(err.message);
            }
        }

        window.onload = fetchData;
    </script>
</body>
</html>
